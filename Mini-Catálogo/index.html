
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Catálogo</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="components/product_card/product-card.js" defer></script> 
</head>
<body>

    <div id="header"><div class="container"></div></div>
    <main>
        <div class="container">
            <h1>Mini Catálogo</h1>
            <section>
                <h2>Tabla de productos (ordenable)</h2>
                <table id="products-table" class="products-table">
                    <thead>
                        <tr>
                            <th data-key="code">Código ▲▼</th>
                            <th data-key="name">Nombre ▲▼</th>
                            <th data-key="price">Precio ▲▼</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
            <section>
                <h2>Tarjetas</h2>
                <div id="product-list"></div>
            </section>
        </div>
    </main>
    <div id="footer"><div class="container"></div></div>

    <script src="js/script.js"></script> 
    <script>
        
        fetch('components/header/header.html')
            .then(response => response.text())
            .then(html => document.getElementById('header').innerHTML = html);

        fetch('components/footer/footer.html')
            .then(response => response.text())
            .then(html => document.getElementById('footer').innerHTML = html);
    </script>
</body>
</html>
